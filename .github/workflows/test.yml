name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Lint, format, typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and formatting checks
        run: npm run ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
